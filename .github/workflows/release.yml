name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_pkg: darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/roundtable dist/
          cp target/${{ matrix.target }}/release/roundtable-chat dist/
          tar czf roundtable-${{ matrix.npm_pkg }}.tar.gz -C dist .

      - name: Prepare npm package
        run: |
          mkdir -p npm/${{ matrix.npm_pkg }}/bin
          cp target/${{ matrix.target }}/release/roundtable npm/${{ matrix.npm_pkg }}/bin/
          cp target/${{ matrix.target }}/release/roundtable-chat npm/${{ matrix.npm_pkg }}/bin/
          chmod +x npm/${{ matrix.npm_pkg }}/bin/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: |
            roundtable-${{ matrix.npm_pkg }}.tar.gz
            npm/${{ matrix.npm_pkg }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            if [ -d "artifacts/$pkg/npm/$pkg" ]; then
              echo "Publishing @roundtable/$pkg"
              cd "artifacts/$pkg/npm/$pkg"
              npm publish --access public || true
              cd -
            fi
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cp -r examples npm/roundtable/
          cd npm/roundtable
          npm publish --access public
